name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive iPhone
        run: |
          xcodebuild archive \
            -project Twinskaraoke.xcodeproj \
            -scheme "Twinskaraoke" \
            -archivePath build/iPhone.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package iPhone IPA
        run: |
          mkdir -p Payload
          cp -R build/iPhone.xcarchive/Products/Applications/*.app Payload/
          zip -v -r Twinskaraoke-iPhone.ipa Payload
          mkdir -p output && mv Twinskaraoke-iPhone.ipa output/

      - name: Upload iPhone IPA
        uses: actions/upload-artifact@v4
        with:
          name: Twinskaraoke-iPhone
          path: output/Twinskaraoke-iPhone.ipa

      - name: Archive Watch
        run: |
          xcodebuild archive \
            -project Twinskaraoke.xcodeproj \
            -scheme "TwinskaraokeWatchApp" \
            -archivePath build/Watch.xcarchive \
            -destination "generic/platform=watchOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package Watch IPA
        run: |
          mkdir -p Payload_Watch
          cp -R build/Watch.xcarchive/Products/Applications/*.app Payload_Watch/
          # Rename folder to Payload specifically for the zip
          mv Payload_Watch Payload
          zip -v -r Twinskaraoke-Watch.ipa Payload
          mkdir -p output_watch && mv Twinskaraoke-Watch.ipa output_watch/

      - name: Upload Watch IPA
        uses: actions/upload-artifact@v4
        with:
          name: Twinskaraoke-Watch
          path: output_watch/Twinskaraoke-Watch.ipa
