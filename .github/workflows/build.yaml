name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      # ------------------------

      - name: Archive iPhone
        run: |
          xcodebuild archive \
            -project Twinskaraoke.xcodeproj \
            -scheme "Twinskaraoke" \
            -archivePath build/iPhone.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package Sideload-Friendly iPhone IPA
        run: |
          mkdir -p Payload
          cp -R build/iPhone.xcarchive/Products/Applications/*.app Payload/
          
          # --- sideload fix ---
          rm -rf Payload/*.app/Watch
          # ---------------------
          
          zip -q -r Twinskaraoke-iPhone-Sideload.ipa Payload
          mkdir -p output && mv Twinskaraoke-iPhone-Sideload.ipa output/

      - name: Upload iPhone IPA
        uses: actions/upload-artifact@v4
        with:
          name: Twinskaraoke-iPhone
          path: output/Twinskaraoke-iPhone-Sideload.ipa

      - name: Archive Watch
        run: |
          xcodebuild archive \
            -project Twinskaraoke.xcodeproj \
            -scheme "TwinskaraokeWatchApp" \
            -archivePath build/Watch.xcarchive \
            -destination "generic/platform=watchOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package Watch IPA
        run: |
          rm -rf Payload
          mkdir -p Payload_Watch
          cp -R build/Watch.xcarchive/Products/Applications/*.app Payload_Watch/
          mv Payload_Watch Payload
          zip -q -r Twinskaraoke-Watch.ipa Payload
          mkdir -p output_watch && mv Twinskaraoke-Watch.ipa output_watch/

      - name: Upload Watch IPA
        uses: actions/upload-artifact@v4
        with:
          name: Twinskaraoke-Watch
          path: output_watch/Twinskaraoke-Watch.ipa

      # --- NIGHTLYS ---
      
      - name: Update "nightly" Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f nightly
          git push -f origin nightly

      - name: Publish Nightly Release
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: "Nightly Build"
          body: "This is an auto-generated build containing the latest bleeding-edge changes. It automatically rebuilds and overwrites this release every time new code is pushed to the `main` branch."
          artifacts: "output/Twinskaraoke-iPhone-Sideload.ipa,output_watch/Twinskaraoke-Watch.ipa"
          allowUpdates: true
          prerelease: true
          replacesArtifacts: true
